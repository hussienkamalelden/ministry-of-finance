<section class="page-hero" dir="rtl">
  <div class="page-container">
    <a routerLink="/dashboard" class="page-back">&rarr; العودة للوحة التفاعلية</a>
    <h1 class="page-title">المؤشرات الاقتصادية</h1>
    <p class="page-subtitle">أهم المؤشرات الاقتصادية المتعلقة بأداء المملكة</p>

    <div class="charts-grid">
      <div class="chart-card">
        <h3 class="chart-card__title">معدل التضخم وسعر الفائدة</h3>
        <p class="chart-card__desc">النسبة المئوية %</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="inflationChart.type" [data]="inflationChart.data" [options]="inflationChart.options"></canvas>
        </div>
        <div class="chart-legend">
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#f5a623"></span>التضخم</span>
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#4dd0a1"></span>سعر الفائدة</span>
        </div>
      </div>

      <div class="chart-card">
        <h3 class="chart-card__title">معدل البطالة</h3>
        <p class="chart-card__desc">النسبة المئوية %</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="unemploymentChart.type" [data]="unemploymentChart.data" [options]="unemploymentChart.options"></canvas>
        </div>
        <div class="chart-legend">
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#2a7f62"></span>ذكور</span>
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#4dd0a1"></span>إناث</span>
        </div>
      </div>

      <div class="chart-card">
        <h3 class="chart-card__title">أسعار النفط</h3>
        <p class="chart-card__desc">دولار / برميل</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="oilPriceChart.type" [data]="oilPriceChart.data" [options]="oilPriceChart.options"></canvas>
        </div>
        <div class="chart-legend">
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#4dd0a1"></span>2024</span>
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#a0e8cc"></span>2025</span>
        </div>
      </div>

      <div class="chart-card">
        <h3 class="chart-card__title">تكوين الناتج المحلي</h3>
        <p class="chart-card__desc">النسبة المئوية من الناتج المحلي %</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="gdpCompositionChart.type" [data]="gdpCompositionChart.data" [options]="gdpCompositionChart.options"></canvas>
        </div>
      </div>
    </div>
  </div>
</section>
