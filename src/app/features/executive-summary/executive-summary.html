<section class="page-hero" dir="rtl">
  <div class="page-container">
    <a routerLink="/dashboard" class="page-back">&rarr; العودة للوحة التفاعلية</a>
    <h1 class="page-title">الملخص التنفيذي</h1>
    <p class="page-subtitle">نظرة شاملة على أداء الميزانية العامة للدولة</p>

    <div class="charts-grid">
      <div class="chart-card">
        <h3 class="chart-card__title">الإيرادات مقابل النفقات</h3>
        <p class="chart-card__desc">مليار ريال</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="revenueExpenseChart.type" [data]="revenueExpenseChart.data" [options]="revenueExpenseChart.options"></canvas>
        </div>
        <div class="chart-legend">
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#4dd0a1"></span>الإيرادات</span>
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#2a7f62"></span>النفقات</span>
        </div>
      </div>

      <div class="chart-card">
        <h3 class="chart-card__title">نمو الناتج المحلي الإجمالي</h3>
        <p class="chart-card__desc">النسبة المئوية %</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="gdpGrowthChart.type" [data]="gdpGrowthChart.data" [options]="gdpGrowthChart.options"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <h3 class="chart-card__title">عجز / فائض الميزانية</h3>
        <p class="chart-card__desc">مليار ريال</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="deficitChart.type" [data]="deficitChart.data" [options]="deficitChart.options"></canvas>
        </div>
        <div class="chart-legend">
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#4dd0a1"></span>فائض</span>
          <span class="chart-legend__item"><span class="chart-legend__dot" style="background:#e74c5e"></span>عجز</span>
        </div>
      </div>

      <div class="chart-card">
        <h3 class="chart-card__title">توزيع النفقات بحسب القطاع</h3>
        <p class="chart-card__desc">مليار ريال - 2025</p>
        <div class="chart-card__canvas-wrap">
          <canvas baseChart [type]="sectorChart.type" [data]="sectorChart.data" [options]="sectorChart.options"></canvas>
        </div>
      </div>
    </div>
  </div>
</section>
