<section class="budget-hero" dir="rtl">
  <div class="budget-hero__overlay">
    <h1 class="budget-hero__title">اللوحة التفاعلية للميزانية</h1>

    <div class="budget-grid">
      <!-- Row 1: 3 cards -->
      <a routerLink="/expenditures" class="budget-card">
        <div class="budget-card__icon">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12h8M12 8v8"/>
            <path d="M6.5 6.5c1.5 1 3.5 1.5 5.5 1.5s4-.5 5.5-1.5" stroke-dasharray="2 2"/>
          </svg>
        </div>
        <span class="budget-card__label">النفقات</span>
      </a>

      <a routerLink="/economic-indicators" class="budget-card">
        <div class="budget-card__icon">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M7 17V13M12 17V9M17 17V7"/>
            <circle cx="18" cy="5" r="2" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <span class="budget-card__label">المؤشرات<br>الاقتصادية</span>
      </a>

      <a routerLink="/executive-summary" class="budget-card">
        <div class="budget-card__icon">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <rect x="4" y="2" width="16" height="20" rx="2"/>
            <path d="M8 6h8M8 10h8M8 14h5"/>
            <path d="M15 14l2 2 4-4"/>
          </svg>
        </div>
        <span class="budget-card__label">الملخص<br>التنفيذي</span>
      </a>

      <!-- Row 2: 2 cards -->
      <a routerLink="/deficit-surplus" class="budget-card">
        <div class="budget-card__icon">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
            <path d="M4 12h2M18 12h2M12 4v2M12 18v2"/>
          </svg>
        </div>
        <span class="budget-card__label">عجز/فائض<br>الميزانية والدين<br>العام</span>
      </a>

      <a routerLink="/revenues" class="budget-card">
        <div class="budget-card__icon">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
          </svg>
        </div>
        <span class="budget-card__label">الإيرادات</span>
      </a>
    </div>
  </div>
</section>
